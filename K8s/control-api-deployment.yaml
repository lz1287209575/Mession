apiVersion: apps/v1
kind: Deployment
metadata:
  name: mession-control-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mession-control-api
  template:
    metadata:
      labels:
        app: mession-control-api
    spec:
      containers:
        - name: control-api
          image: mession-control-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18080
              name: http
          envFrom:
            - configMapRef:
                name: mession-control-api-config
            - secretRef:
                name: mession-control-api-secret
          volumeMounts:
            - name: build-data
              mountPath: /data/build
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: build-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mession-control-api
spec:
  selector:
    app: mession-control-api
  ports:
    - name: http
      port: 18080
      targetPort: http
